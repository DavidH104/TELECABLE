<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <!-- Header -->
          <div class="text-center mb-5">
            <img src="assets/logo.png" alt="TELECABLE" style="max-width: 180px;" class="mb-3">
            <h2 class="fw-bold text-orange">¡Contrata Nuestro Servicio de Cable!</h2>
            <p class="text-muted">55 canales - $200 mensuales</p>
          </div>

          <!-- Formulario -->
          <div *ngIf="!submitted">
            <div class="alert alert-info text-center mb-4">
              <h5>Plan Telecable</h5>
              <p class="mb-0"><strong>$200 pesos al mes</strong> - 55 canales</p>
            </div>

            <form (ngSubmit)="submit()">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nombre Completo *</label>
                  <input type="text" class="form-control" [(ngModel)]="nombre" name="nombre" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Teléfono *</label>
                  <input type="tel" class="form-control" [(ngModel)]="telefono" name="telefono" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Dirección *</label>
                <input type="text" class="form-control" [(ngModel)]="direccion" name="direccion" required>
              </div>

              <div *ngIf="error" class="alert alert-danger">{{error}}</div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-orange btn-lg" [disabled]="loading">
                  <span *ngIf="!loading">Solicitar Servicio</span>
                  <span *ngIf="loading">
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    Enviando...
                  </span>
                </button>
              </div>
            </form>
          </div>

          <!-- Success -->
          <div *ngIf="submitted" class="text-center">
            <div class="alert alert-success">
              <h4>¡Solicitud Enviada!</h4>
              <p>Tu solicitud ha sido enviada correctamente.</p>
              <p class="mb-0">Te contactaremos en breve para confirmar tu servicio.</p>
            </div>
            <button class="btn btn-primary" (click)="volver()">Volver</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
