<div class="login-container">
  <div class="login-box">
    <!-- Logo -->
    <div class="logo-container">
      <img src="assets/logo.jpg" alt="TELECABLE" class="logo-img">
      <p class="logo-slogan">Sistema de Gestión de Clientes</p>
    </div>

    <!-- Botón para cambiar entre Admin y Cliente -->
    <div class="switch-container">
      <button 
        class="btn-switch" 
        [class.active]="isAdminMode" 
        (click)="isAdminMode = true">
        Administrador
      </button>
      <button 
        class="btn-switch" 
        [class.active]="!isAdminMode" 
        (click)="isAdminMode = false">
        Cliente
      </button>
    </div>

    <!-- Login Administrador -->
    <div class="card p-4" *ngIf="isAdminMode">
      <h4 class="mb-3"><i class="bi bi-shield-lock me-2"></i>Acceso Administrador</h4>
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" placeholder="Usuario" [(ngModel)]="usuario" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="password" class="form-control" placeholder="Contraseña" [(ngModel)]="password" (keyup.enter)="login()" />
        </div>
      </div>
      <button class="btn btn-primary w-100 btn-sm" (click)="login()">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
      <div class="mt-3 text-center">
        <a href="/login-technician" class="text-orange text-decoration-none small">
          <i class="bi bi-tools me-1"></i>¿Eres técnico? Entra aquí
        </a>
      </div>
    </div>

    <!-- Login Cliente -->
    <div class="card p-4" *ngIf="!isAdminMode">
      <h4 class="mb-3"><i class="bi bi-person-vcard me-2"></i>Portal del Cliente</h4>
      <p class="text-muted mb-3">Ingresa tu número de contrato</p>
      <div class="mb-3">
        <label class="form-label">Número de Contrato</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-hash"></i></span>
          <input type="text" class="form-control" placeholder="Ej: 12345" [(ngModel)]="contrato" (keyup.enter)="loginClient()" />
        </div>
      </div>
      <button class="btn btn-success w-100 btn-sm" (click)="loginClient()">
        <i class="bi bi-box-arrow-in-right me-2"></i>Consultar Mi Cuenta
      </button>

      <div class="mt-2 text-center">
        <a href="/preregistro" class="text-primary text-decoration-none small">
          <i class="bi bi-tv me-1"></i>¿Nuevo cliente? Solicita servicio de TV e Internet
        </a>
      </div>
    </div>

    <!-- Pie -->
    <div class="login-footer">
      <small>© 2026 TELECABLE - Todos los derechos reservados</small>
    </div>
  </div>
</div>
