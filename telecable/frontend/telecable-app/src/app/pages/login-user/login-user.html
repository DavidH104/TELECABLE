<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card p-4">
        <h2 class="text-center mb-4">Portal del Cliente</h2>
        
        <!-- Step 1: Phone -->
        <div *ngIf="step === 'phone'">
          <p class="text-center text-muted mb-4">Ingresa tu número de contrato y teléfono</p>
          <div class="form-group">
            <input 
              type="text"
              class="form-control mb-3"
              placeholder="Número de Contrato"
              [(ngModel)]="contrato"
            />
            <input 
              type="tel"
              class="form-control mb-3"
              placeholder="Teléfono registrado"
              [(ngModel)]="telefono"
            />
          </div>
          <button class="btn btn-primary w-100" (click)="requestCode()" [disabled]="loading">
            <span *ngIf="!loading">Obtener Código</span>
            <span *ngIf="loading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Enviando...
            </span>
          </button>
        </div>

        <!-- Step 2: Code + Password -->
        <div *ngIf="step === 'code'">
          <p class="text-center text-muted mb-4">Ingresa el código de verificación y tu contraseña</p>
          <div class="form-group">
            <input 
              type="text"
              class="form-control mb-3"
              placeholder="Código de verificación"
              [(ngModel)]="codigo"
            />
            <input 
              type="password"
              class="form-control mb-3"
              placeholder="Contraseña"
              [(ngModel)]="password"
            />
          </div>
          <button class="btn btn-success w-100" (click)="login()" [disabled]="loading">
            <span *ngIf="!loading">Iniciar Sesión</span>
            <span *ngIf="loading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Verificando...
            </span>
          </button>
          <button class="btn btn-link w-100 mt-2" (click)="backToPhone()">
            ← Volver
          </button>
        </div>
        

        
        <div *ngIf="error" class="alert alert-danger mt-3">
          {{ error }}
        </div>
        
        <div *ngIf="success" class="alert alert-success mt-3">
          {{ success }}
        </div>
      </div>
    </div>
  </div>
</div>
