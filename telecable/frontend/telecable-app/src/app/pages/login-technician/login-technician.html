<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <!-- Logo y Título -->
          <div class="text-center mb-4">
            <img src="assets/logo.png" alt="TELECABLE" style="max-width: 150px;" class="mb-3">
            <h3 class="fw-bold text-orange">Acceso Técnico</h3>
            <p class="text-muted">Ingresa tus credenciales</p>
          </div>

          <!-- Formulario -->
          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-person-fill text-orange"></i>
                </span>
                <input type="text" class="form-control" [(ngModel)]="username" name="username" 
                       placeholder="Usuario" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-lock-fill text-orange"></i>
                </span>
                <input [type]="showPassword ? 'text' : 'password'" class="form-control" 
                       [(ngModel)]="password" name="password" 
                       placeholder="Contraseña" required>
                <button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword">
                  <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                </button>
              </div>
            </div>

            <!-- Error Message -->
            <div *ngIf="error" class="alert alert-danger py-2">
              {{ error }}
            </div>

            <!-- Botón de Login -->
            <button type="submit" class="btn btn-orange w-100 py-2 fw-bold" [disabled]="loading">
              <span *ngIf="!loading">INGRESAR</span>
              <span *ngIf="loading">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Verificando...
              </span>
            </button>
          </form>

          <!-- Links adicionales -->
          <div class="text-center mt-4">
            <a href="/login" class="text-orange text-decoration-none fw-semibold">
              <i class="bi bi-arrow-left me-1"></i> Volver al login principal
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
